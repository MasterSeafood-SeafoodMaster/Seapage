name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'next/package-lock.json' # 指定快取檔案路徑

      # 1. 在 next 資料夾內安裝套件
      - name: Install dependencies
        working-directory: ./next
        run: npm ci

      # 2. 在 next 資料夾內進行編譯打包
      - name: Build Next.js
        working-directory: ./next
        run: npm run build

      # 3. 部署打包好的網頁（路徑改成 next/out）
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: next/out # 關鍵：指定指向子資料夾內的 out
          branch: gh-pages